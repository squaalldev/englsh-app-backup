<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Headline Booster AI</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --sidebar: #ffffff;
      --ink: #091831;
      --muted: #667085;
      --line: #e7e9ef;
      --brown: #9b6a53;
      --brown-dark: #7f553f;
      --soft-brown: #f4ece7;
      --card: #ffffff;
      --shadow: 0 22px 70px rgba(16, 24, 40, 0.08);
      --radius: 28px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      overflow: hidden;
    }

    button, textarea { font: inherit; }
    button { cursor: pointer; }

    .app-shell {
      min-height: 100dvh;
      display: grid;
      grid-template-columns: minmax(270px, 426px) minmax(0, 1fr);
      background: var(--bg);
    }

    .sidebar {
      background: var(--sidebar);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      box-shadow: 18px 0 55px rgba(16, 24, 40, 0.04);
      z-index: 2;
    }

    .brand-block {
      padding: clamp(24px, 4vw, 46px) 20px 24px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      margin: 0 0 26px;
      font-size: clamp(1.65rem, 2.1vw, 2rem);
      line-height: 1.08;
      letter-spacing: -0.055em;
      font-weight: 900;
    }

    .brand span { color: var(--brown); }

    .new-button {
      width: 100%;
      min-height: 68px;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, #ae7a62, var(--brown-dark));
      color: white;
      font-weight: 850;
      font-size: 1.08rem;
      box-shadow: 0 16px 28px rgba(127, 85, 63, 0.22);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .new-button:hover { transform: translateY(-1px); box-shadow: 0 20px 34px rgba(127, 85, 63, 0.27); }

    .history-area {
      padding: 24px 20px;
      overflow: auto;
    }

    .section-label {
      margin: 0 0 18px;
      color: #697386;
      font-size: .82rem;
      font-weight: 900;
      letter-spacing: .16em;
    }

    .history-empty {
      color: #98a2b3;
      font-size: .95rem;
      line-height: 1.45;
    }

    .history-list { display: grid; gap: 10px; }

    .history-item {
      width: 100%;
      border: 1px solid transparent;
      background: #fbfbfd;
      border-radius: 16px;
      padding: 12px 12px 12px 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      text-align: left;
      color: var(--ink);
    }

    .history-item.active {
      border-color: rgba(155, 106, 83, .35);
      background: var(--soft-brown);
    }

    .history-title {
      font-size: .95rem;
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-date {
      display: block;
      margin-top: 4px;
      color: #8a94a6;
      font-size: .78rem;
      font-weight: 550;
    }

    .delete-session {
      border: 0;
      background: transparent;
      color: #9aa3b2;
      border-radius: 10px;
      width: 34px;
      height: 34px;
      font-size: 1.05rem;
    }

    .delete-session:hover { background: rgba(127, 85, 63, .1); color: var(--brown-dark); }

    .main {
      min-width: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.95), rgba(246,247,251,.4) 38%, transparent 70%),
        var(--bg);
    }

    .content-scroll {
      flex: 1;
      overflow: auto;
      padding: clamp(42px, 7vw, 118px) clamp(22px, 5vw, 80px) 26px;
      scrollbar-width: thin;
      scrollbar-color: rgba(155, 106, 83, .38) transparent;
    }

    .content-scroll::-webkit-scrollbar,
    .history-area::-webkit-scrollbar { width: 10px; }
    .content-scroll::-webkit-scrollbar-track,
    .history-area::-webkit-scrollbar-track { background: transparent; }
    .content-scroll::-webkit-scrollbar-thumb,
    .history-area::-webkit-scrollbar-thumb {
      background: rgba(155, 106, 83, .32);
      border-radius: 999px;
      border: 3px solid transparent;
      background-clip: content-box;
    }

    .hero {
      max-width: 820px;
      margin: 0 auto;
      min-height: min(520px, 62dvh);
      display: grid;
      place-items: center;
      text-align: center;
    }

    .hero-inner { transform: translateY(-8px); }

    .avatar {
      width: clamp(148px, 13vw, 238px);
      aspect-ratio: 1;
      margin: 0 auto 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #9f7059;
      box-shadow: 0 30px 90px rgba(82, 60, 48, .22);
    }

    .avatar-face {
      width: 50%;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: clamp(2.8rem, 5vw, 4.8rem);
      background: linear-gradient(135deg, #ffd34f, #ff736e 82%);
      box-shadow: inset 0 -12px 20px rgba(135, 64, 55, .16);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.05rem, 3vw, 3rem);
      letter-spacing: -0.055em;
      line-height: 1.03;
      font-weight: 900;
    }

    .hero p {
      max-width: 660px;
      margin: 24px auto 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 1.4vw, 1.32rem);
      line-height: 1.55;
    }

    .results {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
      animation: rise .24s ease-out;
    }

    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .original-card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.72);
      border-radius: 22px;
      padding: 18px 20px;
      color: #536072;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: clamp(18px, 2.2vw, 28px);
      box-shadow: 0 12px 40px rgba(16,24,40,.055);
    }

    .card h2, .card h3 {
      margin: 0 0 14px;
      letter-spacing: -0.035em;
      line-height: 1.1;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .score {
      border-radius: 18px;
      background: #f8f4f1;
      padding: 16px;
      border: 1px solid rgba(155,106,83,.12);
    }

    .score b { display: block; font-size: 1.6rem; letter-spacing: -.05em; color: var(--brown-dark); }
    .score span { color: #6b7280; font-size: .86rem; font-weight: 750; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .card p, .card li { color: #4d596a; line-height: 1.62; }
    .card ul { margin: 0; padding-left: 1.15rem; }

    .versions { display: grid; gap: 12px; }
    .version {
      border: 1px solid #e6e8ee;
      border-radius: 18px;
      padding: 16px 18px;
      display: grid;
      gap: 8px;
      background: #fbfcfe;
    }
    .version.winner { border-color: rgba(155,106,83,.42); background: linear-gradient(180deg, #fff, #fbf4f0); }
    .version-label { color: var(--brown-dark); font-weight: 900; font-size: .86rem; letter-spacing: .04em; text-transform: uppercase; }
    .version-text { font-size: 1.04rem; line-height: 1.5; }

    .battle-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .battle-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fbfbfd;
      color: #536072;
    }
    .battle-item b { color: var(--ink); }

    .winner-card {
      background: linear-gradient(135deg, var(--brown), var(--brown-dark));
      color: white;
      border: 0;
    }
    .winner-card p { color: rgba(255,255,255,.88); }
    .winner-title { font-size: clamp(1.25rem, 2vw, 1.65rem); line-height: 1.35; font-weight: 850; }

    .composer-wrap {
      border-top: 1px solid rgba(225, 229, 236, .75);
      background: rgba(246, 247, 251, .92);
      backdrop-filter: blur(18px);
      padding: 26px clamp(20px, 4vw, 70px) 14px;
    }

    .composer {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 94px;
      gap: 16px;
      align-items: stretch;
    }

    textarea {
      width: 100%;
      min-height: 96px;
      max-height: 190px;
      resize: none;
      border: 0;
      outline: none;
      border-radius: 34px;
      background: #eef0f5;
      padding: 28px 30px;
      color: var(--ink);
      font-size: clamp(1rem, 1.45vw, 1.22rem);
      line-height: 1.42;
      box-shadow: inset 0 0 0 1px rgba(16,24,40,.025);
    }

    textarea::placeholder { color: #757f90; }

    .send-button {
      border: 0;
      border-radius: 28px;
      min-height: 96px;
      background: #c9cfd9;
      color: #3d4655;
      font-size: 2rem;
      transition: transform .18s ease, background .18s ease, color .18s ease;
    }
    .send-button:hover:not(:disabled) { transform: translateY(-1px); background: var(--brown); color: white; }
    .send-button:disabled { opacity: .65; cursor: wait; }

    .hint {
      max-width: 1400px;
      margin: 16px auto 0;
      text-align: center;
      color: #98a2b3;
      font-size: .92rem;
    }

    .loading {
      max-width: 720px;
      margin: 0 auto;
      border-radius: 24px;
      padding: 22px 24px;
      background: white;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      color: #5c6677;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--brown);
      box-shadow: 0 0 0 0 rgba(155,106,83,.45);
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 70% { box-shadow: 0 0 0 12px rgba(155,106,83,0); } 100% { box-shadow: 0 0 0 0 rgba(155,106,83,0); } }

    .error-card {
      max-width: 720px;
      margin: 0 auto;
      background: #fff4f4;
      border: 1px solid #ffd6d6;
      color: #8a2424;
      border-radius: 22px;
      padding: 18px 20px;
    }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { min-height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      .brand-block { padding: 22px 18px; }
      .brand { margin-bottom: 16px; }
      .new-button { min-height: 56px; }
      .history-area { padding: 16px 18px; max-height: 210px; }
      .main { min-height: calc(100dvh - 210px); }
      .content-scroll { overflow: visible; padding: 34px 18px 18px; }
      .hero { min-height: 380px; }
      .avatar { margin-bottom: 26px; }
      .score-grid, .two-col, .battle-grid { grid-template-columns: 1fr; }
      .composer-wrap { position: sticky; bottom: 0; padding: 18px 14px 12px; }
      .composer { grid-template-columns: minmax(0, 1fr) 62px; gap: 10px; }
      textarea { min-height: 70px; border-radius: 22px; padding: 20px; }
      .send-button { min-height: 70px; border-radius: 22px; font-size: 1.5rem; }
      .hint { font-size: .78rem; }
    }

    @media (max-width: 520px) {
      .brand { font-size: 1.45rem; }
      .history-item { padding: 10px; }
      .hero p { font-size: 1rem; }
      .card { border-radius: 20px; }
      .composer-wrap { padding-left: 10px; padding-right: 10px; }
      .composer { grid-template-columns: minmax(0, 1fr) 56px; }
      textarea { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Historial local">
      <div class="brand-block">
        <h1 class="brand">Headline Booster <span>AI</span></h1>
        <button id="newButton" class="new-button" type="button">+ Nuevo titular</button>
      </div>
      <div class="history-area">
        <p class="section-label">HISTORIAL LOCAL</p>
        <div id="historyList" class="history-list"></div>
      </div>
    </aside>

    <main class="main">
      <section id="content" class="content-scroll" aria-live="polite"></section>
      <section class="composer-wrap" aria-label="Enviar titular">
        <form id="headlineForm" class="composer">
          <textarea id="headlineInput" rows="1" placeholder="Pega tu titular actual... Ej. Aprende Diseño Humano" required></textarea>
          <button id="sendButton" class="send-button" type="submit" aria-label="Enviar">→</button>
        </form>
        <p class="hint">Presiona Enter para enviar · Shift+Enter para nueva línea · El historial se guarda solo en este navegador</p>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = 'headline_booster_ai_sessions_v1';
    const content = document.getElementById('content');
    const historyList = document.getElementById('historyList');
    const form = document.getElementById('headlineForm');
    const input = document.getElementById('headlineInput');
    const sendButton = document.getElementById('sendButton');
    const newButton = document.getElementById('newButton');

    let sessions = loadSessions();
    let activeId = null;

    function loadSessions() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch (_) {
        return [];
      }
    }

    function saveSessions() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions.slice(0, 30)));
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function sessionTitle(text) {
      const clean = String(text || '').trim();
      return clean.length > 48 ? clean.slice(0, 48) + '…' : clean || 'Titular sin nombre';
    }

    function formatDate(iso) {
      try {
        return new Intl.DateTimeFormat('es', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }).format(new Date(iso));
      } catch (_) {
        return '';
      }
    }

    function renderHistory() {
      if (!sessions.length) {
        historyList.innerHTML = '<p class="history-empty">Tus titulares optimizados aparecerán aquí solo en este navegador.</p>';
        return;
      }
      historyList.innerHTML = sessions.map(session => `
        <div class="history-item ${session.id === activeId ? 'active' : ''}" data-id="${session.id}">
          <button type="button" class="history-open" data-id="${session.id}" style="all:unset; min-width:0; cursor:pointer;">
            <span class="history-title">${escapeHtml(sessionTitle(session.headline))}</span>
            <span class="history-date">${escapeHtml(formatDate(session.createdAt))}</span>
          </button>
          <button type="button" class="delete-session" data-delete="${session.id}" aria-label="Borrar sesión">×</button>
        </div>
      `).join('');
    }

    function renderHero() {
      activeId = null;
      content.innerHTML = `
        <div class="hero">
          <div class="hero-inner">
            <div class="avatar"><div class="avatar-face">😊</div></div>
            <h1>Headline Coach</h1>
            <p>Pega un titular débil. El modelo pequeño lo diagnostica, crea 3 versiones mejores y elige el ganador.</p>
          </div>
        </div>
      `;
      renderHistory();
    }

    function renderLoading(headline) {
      content.innerHTML = `
        <div class="loading">
          <span class="pulse"></span>
          <div><strong>Analizando titular...</strong><br>${escapeHtml(headline)}</div>
        </div>
      `;
    }

    function renderError(message) {
      content.innerHTML = `<div class="error-card"><strong>No pude procesar el titular.</strong><br>${escapeHtml(message)}</div>`;
    }

    function renderResult(data) {
      const scores = data.diagnostico || {};
      const versions = data.versiones || [];
      const missing = data.falta || [];
      const battle = data.mini_battle || { mas_claro: 1, mas_emocional: 2, mas_curioso: 3 };
      content.innerHTML = `
        <div class="results">
          <div class="original-card"><strong>Titular original:</strong> ${escapeHtml(data.titular_original)}</div>

          <section class="card">
            <h2>Diagnóstico del titular</h2>
            <div class="score-grid">
              <div class="score"><b>${Number(scores.claridad ?? 0)}/100</b><span>Claridad</span></div>
              <div class="score"><b>${Number(scores.deseo ?? 0)}/100</b><span>Deseo</span></div>
              <div class="score"><b>${Number(scores.especificidad ?? 0)}/100</b><span>Especificidad</span></div>
              <div class="score"><b>${Number(scores.diferenciacion ?? 0)}/100</b><span>Diferenciación</span></div>
            </div>
          </section>

          <div class="two-col">
            <section class="card">
              <h3>Problema principal</h3>
              <p>${escapeHtml(data.problema_principal)}</p>
            </section>
            <section class="card">
              <h3>Qué le falta</h3>
              <ul>${missing.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
            </section>
          </div>

          <section class="card">
            <h2>Versiones mejoradas</h2>
            <div class="versions">
              ${versions.map((version, index) => `
                <div class="version ${data.ganador_numero === index + 1 ? 'winner' : ''}">
                  <span class="version-label">#${index + 1}${data.ganador_numero === index + 1 ? ' · Ganador' : ''}</span>
                  <div class="version-text">${escapeHtml(version)}</div>
                </div>
              `).join('')}
            </div>
          </section>

          <section class="card">
            <h2>Mini Battle</h2>
            <div class="battle-grid">
              <div class="battle-item">Más claro: <b>#${Number(battle.mas_claro || 1)}</b></div>
              <div class="battle-item">Más emocional: <b>#${Number(battle.mas_emocional || 2)}</b></div>
              <div class="battle-item">Más curioso: <b>#${Number(battle.mas_curioso || 3)}</b></div>
            </div>
          </section>

          <section class="card winner-card">
            <h2>Ganador</h2>
            <div class="winner-title">#${Number(data.ganador_numero || 1)} — ${escapeHtml(data.ganador)}</div>
            <p><strong>Por qué gana:</strong> ${escapeHtml(data.por_que_gana)}</p>
          </section>
        </div>
      `;
    }

    function upsertSession(headline, result) {
      const session = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        headline,
        result,
        createdAt: new Date().toISOString()
      };
      sessions = [session, ...sessions.filter(item => item.headline !== headline)].slice(0, 30);
      activeId = session.id;
      saveSessions();
      renderHistory();
    }

    async function submitHeadline(headline) {
      renderLoading(headline);
      sendButton.disabled = true;
      try {
        const response = await fetch('/api/improve_headline', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ headline })
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.detail || 'Respuesta inválida del servidor');
        }
        renderResult(data);
        upsertSession(headline, data);
      } catch (error) {
        renderError(error.message || 'Error desconocido');
      } finally {
        sendButton.disabled = false;
      }
    }

    form.addEventListener('submit', event => {
      event.preventDefault();
      const headline = input.value.trim();
      if (!headline) return;
      input.value = '';
      submitHeadline(headline);
    });

    input.addEventListener('keydown', event => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    newButton.addEventListener('click', () => {
      input.value = '';
      renderHero();
      input.focus();
    });

    historyList.addEventListener('click', event => {
      const deleteId = event.target.getAttribute('data-delete');
      if (deleteId) {
        sessions = sessions.filter(session => session.id !== deleteId);
        if (activeId === deleteId) renderHero();
        saveSessions();
        renderHistory();
        return;
      }
      const openButton = event.target.closest('.history-open');
      if (openButton) {
        const session = sessions.find(item => item.id === openButton.dataset.id);
        if (session) {
          activeId = session.id;
          renderResult(session.result);
          renderHistory();
        }
      }
    });

    renderHero();
  </script>
</body>
</html>
